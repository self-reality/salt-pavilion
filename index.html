<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>SPAM — Physics Test</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #ffffff;
        }
        #app {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        #hint {
            position: fixed;
            left: 50%;
            bottom: 32px;
            transform: translateX(-50%);
            font: 14px/1.4 -apple-system, system-ui, sans-serif;
            color: #555;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px 16px;
            text-align: center;
            pointer-events: none;
            user-select: none;
        }
        #hint b { color: #111; }
    </style>
</head>
<body>
    <canvas id="app"></canvas>
    <div id="hint">
        Click to fly &nbsp;·&nbsp; <b>Mouse</b> steer &nbsp;·&nbsp;
        <b>WASD</b> thrust &nbsp;·&nbsp; <b>Space/Shift</b> up·down &nbsp;·&nbsp;
        <b>Esc</b> to release &amp; tweak the panel
    </div>
    <script type="module" src="./src/main.js"></script>
</body>
</html>
